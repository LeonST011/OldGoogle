<div class="content">

<img src="Google.png">
</div>

<form action="https://www.google.com/search">
<div class="searchbox">
<input type="text" id="search" name="q" autocomplete="off">
<div class="suggestions" id="suggestions"></div>
</div>

<div class="buttons">
<button type="submit">Google Search</button>

</div>

<script>
let input = document.getElementById("search");
let box = document.getElementById("suggestions");
let selected = -1;
let suggestions = [];

function highlight(text, query){
let i = text.toLowerCase().indexOf(query.toLowerCase());
if(i === -1) return text;
return text.substring(0,i) +
"<b>" + text.substring(i, i+query.length) + "</b>" +
text.substring(i+query.length);
}

input.addEventListener("input", function(){
let q = input.value;

if(q.length === 0){
box.style.display="none";
return;
}

fetch("https://suggestqueries.google.com/complete/search?client=firefox&q=" + q)
.then(r=>r.json())
.then(data=>{
suggestions = data[1];
selected = -1;
box.innerHTML="";

suggestions.forEach((s,i)=>{
let div = document.createElement("div");
div.innerHTML = highlight(s, q);

div.onclick = ()=>{
input.value = s;
box.style.display="none";
};

box.appendChild(div);
});

box.style.display="block";
});
});

input.addEventListener("keydown", function(e){
let items = box.getElementsByTagName("div");

if(e.key === "ArrowDown"){
selected++;
if(selected >= items.length) selected = 0;
update();
e.preventDefault();
}

if(e.key === "ArrowUp"){
selected--;
if(selected < 0) selected = items.length-1;
update();
e.preventDefault();
}

if(e.key === "Enter" && selected >= 0){
input.value = suggestions[selected];
box.style.display="none";
}
});

function update(){
let items = box.getElementsByTagName("div");
for(let i=0;i<items.length;i++){
items[i].classList.remove("active");
}
if(selected >= 0){
items[selected].classList.add("active");
input.value = suggestions[selected];
}
}
</script>
